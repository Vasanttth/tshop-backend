spring.application.name=apigateway

server.port=${PORT:8088}

spring.cloud.gateway.routes[0].id=productservice
spring.cloud.gateway.routes[0].uri=${PRODUCT_SERVICE_URL}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/products/**

spring.cloud.gateway.routes[1].id=cartservice
spring.cloud.gateway.routes[1].uri=${CART_SERVICE_URL}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/cart/**

spring.cloud.gateway.routes[2].id=userservice
spring.cloud.gateway.routes[2].uri=${USER_SERVICE_URL}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[3].id=orderservice
spring.cloud.gateway.routes[3].uri=${ORDER_SERVICE_URL}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/orders/**